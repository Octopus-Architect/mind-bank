<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Core - 20 Tools</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 5px; margin: 0; }
        .header { background: #111; padding: 10px; border-bottom: 2px solid #0f0; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 5px; }
        .btn { 
            background: #050505; border: 1px solid #0f0; color: #0f0; 
            padding: 10px 2px; font-size: 10px; border-radius: 4px; cursor: pointer;
            height: 60px; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .btn:active { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        .btn.red { border-color: #f00; color: #f00; }
        .btn.blue { border-color: #00f; color: #00f; }
        .btn.gold { border-color: #ffd700; color: #ffd700; }
        #terminal { 
            background: #0a0a0a; color: #ffd700; padding: 10px; margin: 10px 5px; 
            height: 80px; font-size: 11px; border: 1px solid #333; overflow-y: auto; text-align: left;
        }
    </style>
</head>
<body>
    <div class="header">🐙 OCTOPUS CONTROL - 20 UNITS</div>
    
    <div id="terminal">> النظام جاهز للاختبار...<br>> امل، اختاري الأداة المطلوبة:</div>

    <div class="grid">
        <button class="btn gold" onclick="run(1)">صيانة<br>الأساس</button>
        <button class="btn gold" onclick="run(2)">تحديث<br>السحابة</button>
        <button class="btn gold" onclick="run(3)">نسخ<br>احتياطي</button>
        <button class="btn gold" onclick="run(4)">مسح<br>الكاش</button>

        <button class="btn blue" onclick="run(5)">كشف<br>الـ IP</button>
        <button class="btn blue" onclick="run(6)">تحديد<br>الموقع</button>
        <button class="btn blue" onclick="run(7)">نوع<br>الجهاز</button>
        <button class="btn blue" onclick="run(8)">مراقبة<br>حيّة</button>

        <button class="btn red" onclick="run(9)">فحص<br>ثغرات</button>
        <button class="btn red" onclick="run(10)">Click<br>Jack</button>
        <button class="btn red" onclick="run(11)">تشفير<br>SSL</button>
        <button class="btn red" onclick="run(12)">حظر<br>هجوم</button>

        <button class="btn" onclick="run(13)">IP<br>عشوائي</button>
        <button class="btn" onclick="run(14)">تغيير<br>الهوية</button>
        <button class="btn" onclick="run(15)">مفتاح<br>جديد</button>
        <button class="btn" onclick="run(16)">مسح<br>الأثر</button>

        <button class="btn gold" onclick="run(17)">تعديل<br>العرض</button>
        <button class="btn gold" onclick="run(18)">إرسال<br>كود</button>
        <button class="btn gold" onclick="run(19)">دخول<br>المشرف</button>
        <button class="btn red" onclick="run(20)">إغلاق<br>كلي</button>
    </div>

    <script>
        function run(id) {
            const term = document.getElementById('terminal');
            term.innerHTML += '<br>> تنفيذ الوحدة ' + id + ' جاري...';
            term.scrollTop = term.scrollHeight;
            fetch('/cmd?id=' + id).catch(() => {});
        }
    </script>
</body>
</html>
