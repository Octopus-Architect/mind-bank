<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Control - 14px Edition</title>
    <style>
        body { 
            background: #f0f8ff; /* لبني فاتح مريح */
            color: #000; 
            font-family: sans-serif; 
            padding: 5px; 
            margin: 0; 
        }
        .header { 
            background: #add8e6; 
            padding: 12px; 
            border-bottom: 2px solid #87ceeb; 
            font-weight: bold;
            text-align: center;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* جعلناها عمودين ليتناسب حجم الخط 14 مع العرض */
            gap: 10px; 
            padding: 10px; 
        }
        .btn { 
            background: #ffffff; 
            border: 2px solid #add8e6; 
            color: #000; 
            padding: 15px 5px; 
            font-size: 14px; /* الحجم المطلوب */
            font-weight: bold;
            border-radius: 12px; 
            cursor: pointer;
            text-align: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }
        .btn:active { 
            background: #add8e6; 
        }
        #terminal { 
            background: #fff; 
            color: #000; 
            padding: 10px; 
            margin: 10px; 
            height: 70px; 
            font-size: 13px; 
            border: 2px solid #add8e6; 
            border-radius: 10px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="header">🐙 لوحة تحكم الأخطبوط (14px)</div>
    
    <div id="terminal">النظام جاهز...<br>اختاري الأداة للمذاكرة:</div>

    <div class="grid">
        <button class="btn" onclick="run(1)">🛠️ صيانة الأساس</button>
        <button class="btn" onclick="run(2)">🔄 تحديث السحابة</button>
        <button class="btn" onclick="run(5)">👁️ كشف الـ IP</button>
        <button class="btn" onclick="run(10)">🛡️ منع الـ Clickjack</button>
        <button class="btn" onclick="run(13)">🔑 IP عشوائي</button>
        <button class="btn" onclick="run(15)">🎫 مفتاح جديد</button>
        <button class="btn" onclick="run(7)">📱 نوع الجهاز</button>
        <button class="btn" style="border-color: #ffb6c1;" onclick="run(20)">🛑 إغلاق كلي</button>
    </div>

    <script>
        function run(id) {
            const term = document.getElementById('terminal');
            term.innerHTML += '<br> جاري تشغيل الوحدة ' + id + '...';
            term.scrollTop = term.scrollHeight;
            fetch('/cmd?id=' + id).catch(() => {});
        }
    </script>
</body>
</html>
