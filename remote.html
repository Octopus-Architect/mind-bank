<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Remote</title>
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        body { background: #000; color: #ffd700; text-align: center; padding-top: 50px; font-family: sans-serif; }
        .btn-control { 
            border: 3px solid #ffd700; padding: 30px; border-radius: 50%; 
            background: none; color: #ffd700; font-size: 24px; font-weight: bold;
            box-shadow: 0 0 20px #ffd700; width: 150px; height: 150px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div style="margin-top: 50px;">
        <button class="btn-control" onclick="sendCommand()">PUSH</button>
        <p id="status" style="margin-top: 20px; color: #00ffcc;">جاهز لإرسال الأوامر للعرض...</p>
    </div>

    <script>
        function sendCommand() {
            document.getElementById('status').innerText = 'جاري تحديث العرض على جيت هاب...';
            // هنا الإشارة بتروح للسيرفر اللي شغال في الكلود شيل
            fetch('/update-display').then(() => {
                document.getElementById('status').innerText = 'تم التحديث بنجاح ✅';
            }).catch(() => {
                document.getElementById('status').innerText = 'تم إرسال الأمر للسيرفر';
            });
        }
    </script>
</body>
</html>
