<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Remote</title>
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        body { background: #000; color: #ffd700; text-align: center; padding-top: 100px; }
        .btn-push { 
            background: #ffd700; color: #000; padding: 30px; border-radius: 50%; 
            width: 160px; height: 160px; border: 5px solid #fff; font-size: 26px; font-weight: bold;
            box-shadow: 0 0 40px #ffd700; cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="btn-push" onclick="location.reload()">PUSH</button>
    <p style="margin-top: 30px;">ريموت التحكم (منفصل)</p>
</body>
</html>
