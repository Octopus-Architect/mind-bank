<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIND BANK - Central Vault</title>
    <style>
        body { background-color: #fdfdfa; color: #000; font-family: 'Times New Roman', serif; margin: 0; padding: 10px; text-align: center; }
        
        /* اسم البنك فوق خالص زي الصفحة الأولى */
        h1 { color: #8a6d3b; font-size: 34px; margin: 15px 0 5px; font-weight: bold; letter-spacing: 2px; }
        p.sub-title { color: #555; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
        
        .vault-form { max-width: 420px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1.5px solid #d4af37; }
        
        .field-group { margin-bottom: 15px; text-align: right; }
        label { display: block; color: #8a6d3b; font-weight: bold; margin-bottom: 5px; font-size: 13px; padding-right: 5px; }
        
        .input-premium { width: 100%; padding: 12px; border: 1px solid #eee; border-bottom: 2px solid #d4af37; background: #fafafa; border-radius: 8px; outline: none; font-size: 15px; box-sizing: border-box; transition: 0.3s; }
        .input-premium:focus { border-color: #b8962e; background: #fff; }

        .btn-confirm { width: 100%; padding: 16px; background: linear-gradient(145deg, #d4af37, #b8962e); color: #fff; border: none; border-radius: 10px; font-size: 19px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        .policy-box { margin-top: 20px; font-size: 12px; color: #8a6d3b; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <h1>MIND BANK</h1>
    <p class="sub-title">تأمين وربط الحساب بالنظام العالمي</p>

    <div class="vault-form">
        <div class="field-group">
            <label>الاسم الكامل / Full Name</label>
            <input type="text" class="input-premium" placeholder="أدخل اسمك الكامل">
        </div>

        <div class="field-group">
            <label>تاريخ الميلاد / Date of Birth</label>
            <input type="date" class="input-premium">
        </div>

        <div class="field-group">
            <label>رقم الموبايل / Mobile Number</label>
            <input type="tel" class="input-premium" placeholder="+00 000 000 000">
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

        <div class="field-group">
            <label>اسم المستخدم / Username</label>
            <input type="text" class="input-premium" placeholder="User123">
        </div>

        <div class="field-group)
            <label>كلمة المرور / Password</label>
            <input type="password" class="input-premium" placeholder="********">
        </div>

        <div class="field-group">
            <label>تأكيد كلمة المرور / Confirm Password</label>
            <input type="password" class="input-premium" placeholder="********">
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

        <div class="field-group">
            <label>العاصمة / Capital</label>
            <input type="text" class="input-premium" placeholder="أدخل العاصمة">
        </div>

        <div class="field-group">
            <label>المدينة / City</label>
            <input type="text" class="input-premium" placeholder="أدخل المدينة">
        </div>

        <div class="field-group">
            <label>الرمز البريدي / Postal Code</label>
            <input type="text" class="input-premium" placeholder="00000">
        </div>

        <button class="btn-confirm" onclick="alert('جاري تشفير البيانات وحفظها في الخزنة...')">تأكيد البيانات</button>

        <div class="policy-box">
            بضغطك على تأكيد، أنت توافق على <a href="#" style="color:#000; text-decoration:none;">شروط الخدمة</a> و <a href="#" style="color:#000; text-decoration:none;">سياسة الخصوصية</a>.
        </div>
    </div>

</body>
</html>
